<div class="row">
  <div class="col">
    <ol class="list-group">
      @for (todo of todos(); track $index) {
      <li
        class="list-group-item">
        {{todo.name}} : {{todo.content}}
        <i
          (click)="deleteTodo(todo)"
          class="bi bi-trash2"></i>
      </li>
    }
    @empty {
      <li class="list-group-item list-group-item-danger">Vous encore aucune tache de planifiée</li>
    }
    </ol>
  </div>
  <div class="col">
    name:
    <input  type="text" [(ngModel)]="todo().name" class="form-control" /> content:
    <input  type="text" [(ngModel)]="todo().content" class="form-control" />
    <button
      [disabled]="!todo().name.trim() || !todo().content.trim()"
      class="btn btn-primary m-2"
      (click)="addTodo()"
    >
      add
    </button>
  </div>
</div>
